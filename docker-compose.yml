services:
    kanka:
        container_name: kanka_ce
        image: 'ghcr.io/kinnewig/kanka-ce:latest'
        ports:
            - '${APP_PORT:-80}:80'
        volumes:
          - '${KANKA_CE_DATA}/kanka-ce:/var/www/html/storage'
          - '.env:/var/www/html/.env'
        networks:
            - kanka
        depends_on:
            - mariadb
            - redis
            - meilisearch
    mariadb:
        container_name: kanka_ce_mariadb
        image: 'mariadb:11'
        ports:
            - '${DB_PORT:-3306}:3306'
        environment:
            MYSQL_DATABASE: '${DB_DATABASE}'
            MYSQL_PASSWORD: '${DB_PASSWORD}'
            MYSQL_ROOT_PASSWORD: '${DB_ROOT_PASSWORD}'
            MYSQL_USER: '${DB_USERNAME}'
            MYSQL_ROOT_HOST: '%'
        volumes:
          - '${KANKA_CE_DATA}/mariadb:/var/lib/mysql'
        networks:
            - kanka
        healthcheck:
            test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
            retries: 3
            timeout: 5s
    redis:
        container_name: kanka_ce_redis
        image: 'redis:alpine'
        ports:
            - '${REDIS_PORT}:6379'
        volumes:
          - '${KANKA_CE_DATA}/redis:/data'
        networks:
            - kanka
        healthcheck:
            test:
                - CMD
                - redis-cli
                - ping
            retries: 3
            timeout: 5s
    meilisearch:
        container_name: kanka_ce_meilisearch
        image: 'getmeili/meilisearch:latest'
        ports:
            - '${FORWARD_MEILISEARCH_PORT:-7700}:7700'
        environment:
            MEILI_NO_ANALYTICS: '${MEILISEARCH_NO_ANALYTICS:-false}'
            MEILI_MASTER_KEY: '${MEILISEARCH_KEY}'
        volumes:
          - '${KANKA_CE_DATA}/meilisearch:/meili_data'
        networks:
            - kanka
        healthcheck:
            test: ["CMD", "wget", "--no-verbose", "--spider",  "http://127.0.0.1:7700/health"]
            retries: 3
            timeout: 5s
networks:
    kanka:
        name: kanka
        driver: bridge
