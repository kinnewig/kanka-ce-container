# For more information: https://laravel.com/docs/sail
services:
    laravel.test:
        container_name: kanka_ce_laravel
        build:
            context: ./vendor/laravel/sail/runtimes/8.4
            dockerfile: Dockerfile
            args:
                WWWGROUP: '${APP_GROUP_ID}'
        image: sail-8.4/app
        extra_hosts:
            - 'host.docker.internal:host-gateway'
        ports:
            - '${APP_PORT:-80}:80'
            - '${HMR_PORT:-8080}:8080'
            - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
        environment:
            WWWUSER: '${APP_USER_ID}'
            LARAVEL_SAIL: 1
            XDEBUG_MODE: '${SAIL_XDEBUG_MODE:-off}'
            XDEBUG_CONFIG: '${SAIL_XDEBUG_CONFIG:-client_host=host.docker.internal}'
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
        depends_on:
            - mariadb
            - redis
            - meilisearch
            - mailpit
    mariadb:
        container_name: kanka_ce_mariadb
        image: 'mariadb:11'
        ports:
            - '${DB_PORT:-3306}:3306'
        environment:
            MYSQL_DATABASE: '${DB_DATABASE}'
            MYSQL_PASSWORD: '${DB_PASSWORD}'
            MYSQL_ROOT_PASSWORD: '${DB_ROOT_PASSWORD}'
            MYSQL_USER: '${DB_USERNAME}'
            MYSQL_ROOT_HOST: '%'
        volumes:
            - '${KANKA_CE_DATA}/mariadb:/var/lib/mysql'
        networks:
            - sail
        healthcheck:
            test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
            retries: 3
            timeout: 5s
    redis:
        container_name: kanka_ce_redis
        image: 'redis:alpine'
        ports:
            - '${REDIS_PORT}:6379'
        volumes:
            - '${KANKA_CE_DATA}/redis:/data'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - redis-cli
                - ping
            retries: 3
            timeout: 5s
    mailpit:
        container_name: kanka_ce_mailpit
        image: axllent/mailpit
        ports:
        - '8025:8025'  # Web UI
        - '${MAIL_PORT}:1025'  # SMTP server
        networks:
            - sail
    meilisearch:
        container_name: kanka_ce_meilisearch
        image: 'getmeili/meilisearch:latest'
        ports:
            - '${FORWARD_MEILISEARCH_PORT:-7700}:7700'
        environment:
            MEILI_NO_ANALYTICS: '${MEILISEARCH_NO_ANALYTICS:-false}'
            MEILI_MASTER_KEY: '${MEILISEARCH_KEY}'
        volumes:
            - '${KANKA_CE_DATA}/meilisearch:/meili_data'
        networks:
            - sail
        healthcheck:
            test: ["CMD", "wget", "--no-verbose", "--spider",  "http://127.0.0.1:7700/health"]
            retries: 3
            timeout: 5s
networks:
    sail:
        name: sail
        driver: bridge
